<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Women Safety</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🛡️ Women Safety</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li><a href="profile.html" class="active">👤 Profile</a></li>
                <li><a href="emergency-contacts.html">📞 Emergency Contacts</a></li>
                <li><a href="alert-history.html">📋 Alert History</a></li>
                <li><a href="evidence.html">📸 Evidence</a></li>
                <li><a href="report-area.html">⚠️ Report Unsafe Area</a></li>
                <li><a href="community-feedback.html">🗺️ Community Feedback</a></li>
                <li><a href="settings.html">⚙️ Settings</a></li>
                <li><a href="#" id="logoutBtn">🚪 Logout</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <h1>My Profile</h1>
            </header>

            <div class="profile-container">
                <form id="profileForm" class="profile-form">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" readonly>
                        <small>Email cannot be changed</small>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" readonly>
                        <small>Phone number cannot be changed</small>
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" rows="4"></textarea>
                    </div>

                    <div id="profileError" class="error-message" style="display: none;"></div>
                    <div id="profileSuccess" class="success-message" style="display: none;"></div>

                    <button type="submit" class="btn btn-primary">Update Profile</button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
