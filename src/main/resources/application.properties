spring.application.name=womensafetyq

# Database Configuration - MySQL
# To use H2 for testing, comment MySQL lines and uncomment H2 lines
#spring.datasource.url=jdbc:mysql://localhost:3306/women_safety_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=Sandesh1234
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Configuration (for testing - uncomment to use H2)
spring.datasource.url=jdbc:h2:mem:women_safety_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# Mail Configuration (Gmail example - update with your credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Media Upload Directory
app.upload.dir=uploads

# SMS/WhatsApp Configuration (Development Mode - Console Logging Only)
# Messages are logged to console for testing
# In production, you can configure Twilio or other SMS providers
twilio.account.sid=
twilio.auth.token=
twilio.phone.number=

# WhatsApp Business API Configuration
whatsapp.api.key=
whatsapp.api.url=

# Server Configuration
server.port=8080
server.address=0.0.0.0

# Session Management (disabled for now)
spring.session.store-type=none

# Logging
logging.level.com.example.womensafetyq=DEBUG
logging.level.org.springframework.security=DEBUG
