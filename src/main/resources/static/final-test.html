<!DOCTYPE html>
<html>
<head>
    <title>Evidence Login Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .form-group {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .message {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 3px solid #dc3545;
            font-size: 16px;
            font-weight: 600;
        }
        .error strong {
            font-size: 20px;
            display: block;
            margin-bottom: 10px;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #0c5460;
        }
        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login Test</h1>
        <p class="subtitle">Test login to view evidence</p>

        <div class="info">
            <strong>📧 Email:</strong> trisha1@gmail.com<br>
            <strong>🔑 Password:</strong> admin123<br>
            <strong>💾 Evidence:</strong> 51 files
        </div>

        <div class="form-group">
            <label for="email">📧 Email or Phone</label>
            <input type="text" id="email" value="trisha1@gmail.com" placeholder="Enter email or phone">
        </div>

        <div class="form-group">
            <label for="password">🔑 Password</label>
            <input type="password" id="password" value="admin123" placeholder="Enter password">
        </div>

        <button onclick="login()" id="loginBtn">
            🚀 Login & View Evidence
        </button>

        <button onclick="registerNew()" class="btn-secondary" id="registerBtn">
            ➕ Register New User Instead
        </button>

        <div id="message" class="message"></div>

        <div id="debug" style="margin-top: 20px; padding: 20px; background: #fff3cd; border: 3px solid #ffc107; border-radius: 10px; font-size: 14px; display: none;">
            <strong style="font-size: 18px; color: #856404;">🐛 DEBUG INFO:</strong><br><br>
            <div id="debugContent" style="color: #856404; line-height: 1.8;"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');
            const debug = document.getElementById('debug');
            const debugContent = document.getElementById('debugContent');
            
            // Show loading
            loginBtn.innerHTML = '<span class="loading"></span> Logging in...';
            loginBtn.disabled = true;
            message.style.display = 'none';
            
            try {
                console.log('Attempting login with:', { email, password: '***' });
                
                const response = await API.login({
                    identifier: email,
                    password: password
                });
                
                console.log('Login response:', response);
                
                // Save auth data
                localStorage.setItem('token', response.token);
                localStorage.setItem('userId', response.userId);
                localStorage.setItem('userName', response.name);
                localStorage.setItem('userEmail', response.email);
                
                message.className = 'message success';
                message.style.display = 'block';
                message.innerHTML = `
                    ✅ <strong>Login Successful!</strong><br>
                    Welcome, ${response.name}!<br>
                    <br>
                    Redirecting to Evidence page...
                `;
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'evidence.html';
                }, 2000);
                
            } catch (error) {
                console.error('Login error:', error);
                
                message.className = 'message error';
                message.style.display = 'block';
                message.innerHTML = `
                    <strong>❌ LOGIN FAILED</strong><br>
                    <div style="margin: 15px 0; font-size: 18px; color: #dc3545;">
                        ${error.message}
                    </div>
                    <div style="background: #fff; padding: 10px; border-radius: 5px; margin-top: 10px;">
                        👇 <strong>CHECK THE YELLOW DEBUG BOX BELOW</strong>
                    </div>
                `;
                
                // Show debug info
                debug.style.display = 'block';
                debugContent.innerHTML = `
                    Email: ${email}<br>
                    Password Length: ${password.length}<br>
                    Error: ${error.message}<br>
                    <br>
                    <strong>Possible Solutions:</strong><br>
                    1. Try registering a new user below<br>
                    2. Check if server is running<br>
                    3. Verify database is accessible
                `;
                
                loginBtn.innerHTML = '🚀 Try Again';
                loginBtn.disabled = false;
            }
        }

        async function registerNew() {
            const message = document.getElementById('message');
            const registerBtn = document.getElementById('registerBtn');
            
            registerBtn.innerHTML = '<span class="loading"></span> Creating user...';
            registerBtn.disabled = true;
            
            try {
                const response = await API.register({
                    name: "Test User",
                    email: "test@test.com",
                    password: "test123",
                    phone: "1234567890",
                    address: "Test Address"
                });
                
                // Save auth data
                localStorage.setItem('token', response.token);
                localStorage.setItem('userId', response.userId);
                localStorage.setItem('userName', response.name);
                localStorage.setItem('userEmail', response.email);
                
                message.className = 'message success';
                message.style.display = 'block';
                message.innerHTML = `
                    ✅ <strong>User Created!</strong><br>
                    Email: test@test.com<br>
                    Password: test123<br>
                    <br>
                    <em>Note: This new user has no evidence yet.<br>
                    Redirecting to dashboard...</em>
                `;
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 3000);
                
            } catch (error) {
                message.className = 'message error';
                message.style.display = 'block';
                
                if (error.message.includes('already exists')) {
                    message.innerHTML = `
                        ⚠️ User already exists!<br>
                        Try logging in with:<br>
                        Email: test@test.com<br>
                        Password: test123
                    `;
                    document.getElementById('email').value = 'test@test.com';
                    document.getElementById('password').value = 'test123';
                } else {
                    message.innerHTML = `❌ ${error.message}`;
                }
                
                registerBtn.innerHTML = '➕ Register New User Instead';
                registerBtn.disabled = false;
            }
        }

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
