<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin - Women Safety</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🔐 Admin Panel</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html">📊 Dashboard</a></li>
                <li><a href="admin-alerts.html">🚨 Active Alerts</a></li>
                <li><a href="admin-users.html" class="active">👥 Manage Users</a></li>
                <li><a href="admin-reports.html">📍 Unsafe Reports</a></li>
                <li><a href="#" id="adminLogoutBtn">🚪 Logout</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <h1>User Management</h1>
                <p>Manage registered users and their accounts</p>
            </header>

            <div class="filter-section">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by name, email or phone..." style="max-width: 400px;">
            </div>

            <div id="usersContainer" class="table-container">
                <p class="loading">Loading users...</p>
            </div>
        </main>
    </div>

    <!-- User Detail Modal -->
    <div id="userModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>User Details</h2>
            <div id="userDetails"></div>
            <div class="modal-actions" id="userActions">
                <!-- Actions will be dynamically added -->
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-users.js"></script>
</body>
</html>
